<html lang="en">
<head>

        @media (max-width: 600px) { .address-row, .address-row-3 { grid-template-columns: 1fr; gap: 10px; } }

        function generateCode(name) {
            let prefix = name.substring(0, 3).toUpperCase().replace(/[^A-Z]/g, '');
            let random = Math.floor(Math.random() * 900) + 100;
            return prefix + random;
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        function escapeForJS(str) {
            if (!str) return "";
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        async function seedGuests() {
            try {
                const snapshot = await getDocs(collection(db, GUESTS_COLLECTION));
                if (snapshot.empty) {
                    for (let i = 0; i < preloadedGuests.length; i++) {
                        let name = preloadedGuests[i];
                        let code = generateCode(name);
                        await addDoc(collection(db, GUESTS_COLLECTION), {
                            name: name,
                            code: code,
                            phone: "",
                            status: "pending",
                            smsSent: false,
                            replied: false,
                            createdAt: new Date().toISOString()
                        });
                    }
                    console.log("Seeded " + preloadedGuests.length + " guests with codes");
                }
            } catch (e) {
                console.error("Seed error:", e);
            }
        }

        // Guest Form

                        <p>request the pleasure of your company</p>
                    </div>

                        <div id="guestErrorMsg" class="error-message"></div>
                        <div id="guestInfoMsg" class="info-message"></div>

                        <div id="codeEntrySection">
                            <div class="code-section">
                                <input type="text" id="inviteCode" placeholder="Enter your invitation code" maxlength="10">
                            </div>
                            <button id="verifyCodeBtn">Verify Code</button>
                            <p style="text-align: center; margin-top: 20px; font-size: 0.75rem; color: #9b8a75;">
                                Your invitation code is on the SMS we sent you

                        <div id="addressFormSection" style="display: none;">

                                <label>Contact Name (for invitation)</label>
                                <input type="text" id="fullName" placeholder="e.g., Mr Mario Rossimel">
                            </div>

                                    <option value="3">3 guests</option>

                                        <option value="VIC">VIC</option>

            const guestCountSelect = document.getElementById("guestCount");
            const guestNamesSection = document.getElementById("guestNamesSection");
            
            guestCountSelect.addEventListener("change", function() {
                let count = parseInt(this.value);
                if (count > 1) {
                    guestNamesSection.style.display = "block";
                    updateGuestNameInputs(count);
                } else {
                    guestNamesSection.style.display = "none";
                }
            });

            function updateGuestNameInputs(count) {
                const container = document.getElementById("guestNamesList");
                container.innerHTML = "";
                for (let i = 1; i < count; i++) {
                    const div = document.createElement("div");
                    div.className = "guest-name-row";
                    div.innerHTML = `
                        <input type="text" placeholder="Guest ${i} name" class="guest-name">
                        ${i > 1 ? '<button type="button" class="remove-guest" onclick="this.parentElement.remove()">✖</button>' : ''}
                    `;
                    container.appendChild(div);
                }
            }

            document.getElementById("addGuestNameBtn").onclick = function() {
                const container = document.getElementById("guestNamesList");
                const div = document.createElement("div");
                div.className = "guest-name-row";
                div.innerHTML = `
                    <input type="text" placeholder="Additional guest name" class="guest-name">
                    <button type="button" class="remove-guest" onclick="this.parentElement.remove()">✖</button>
                `;

                document.getElementById("addressFormSection").style.display = "none";
                document.getElementById("codeEntrySection").style.display = "block";

            };
            document.getElementById("submitAddressBtn").onclick = function() { submitAddress(); };

        async function verifyCode() {
            let code = document.getElementById("inviteCode").value.trim().toUpperCase();
            let errorDiv = document.getElementById("guestErrorMsg");
            let infoDiv = document.getElementById("guestInfoMsg");
            errorDiv.style.display = "none";
            infoDiv.style.display = "none";
            
            if (!code) {
                errorDiv.innerText = "Please enter your invitation code";
                errorDiv.style.display = "block";
                return;
            }

            try {
                const q = query(collection(db, GUESTS_COLLECTION), where("code", "==", code));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    errorDiv.innerText = "Invalid invitation code. Please check the SMS we sent you.";
                    errorDiv.style.display = "block";
                    return;
                }

                const guest = snapshot.docs[0].data();
                const guestId = snapshot.docs[0].id;
                
                const rQuery = query(collection(db, RESPONSES_COLLECTION), where("guestCode", "==", code));
                const rSnapshot = await getDocs(rQuery);
                
                if (!rSnapshot.empty) {
                    let existing = rSnapshot.docs[0].data();
                    document.getElementById("fullName").value = existing.fullName || "";
                    document.getElementById("unitNumber").value = existing.unitNumber || "";
                    document.getElementById("streetAddress").value = existing.streetAddress || "";
                    document.getElementById("suburb").value = existing.suburb || "";
                    document.getElementById("city").value = existing.city || "";
                    document.getElementById("state").value = existing.state || "";
                    document.getElementById("postcode").value = existing.postcode || "";
                    document.getElementById("contact").value = existing.contact || "";
                    infoDiv.innerText = "You have already submitted your details. You can update them below.";
                    infoDiv.style.display = "block";
                }

                sessionStorage.setItem("guestCode", code);
                sessionStorage.setItem("guestId", guestId);
                sessionStorage.setItem("guestName", guest.name);

                document.getElementById("welcomeName").innerHTML = "Welcome " + escapeHtml(guest.name) + "!";
                document.getElementById("codeEntrySection").style.display = "none";
                document.getElementById("addressFormSection").style.display = "block";

            } catch (err) {
                errorDiv.innerText = "Something went wrong. Please try again.";
                errorDiv.style.display = "block";
                console.error(err);
            }
        }

        async function submitAddress() {
            let fullName = document.getElementById("fullName").value.trim();
            let unitNumber = document.getElementById("unitNumber").value.trim();
            let streetAddress = document.getElementById("streetAddress").value.trim();
            let suburb = document.getElementById("suburb").value.trim();
            let city = document.getElementById("city").value.trim();
            let state = document.getElementById("state").value;
            let postcode = document.getElementById("postcode").value.trim();
            let contact = document.getElementById("contact").value.trim();
            let guestCount = parseInt(document.getElementById("guestCount").value);
            
            let fullAddress = "";
            if (unitNumber) fullAddress += unitNumber + " ";
            if (streetAddress) fullAddress += streetAddress;
            if (suburb) fullAddress += ", " + suburb;
            if (city) fullAddress += ", " + city;
            if (state) fullAddress += " " + state;
            if (postcode) fullAddress += " " + postcode;
            
            let guestNames = [];
            if (guestCount > 1) {
                let nameInputs = document.querySelectorAll(".guest-name");
                for (let i = 0; i < nameInputs.length; i++) {
                    let guestName = nameInputs[i].value.trim();
                    if (guestName) guestNames.push(guestName);
                }
            }
            
            let guestCode = sessionStorage.getItem("guestCode");
            let guestId = sessionStorage.getItem("guestId");
            let guestName = sessionStorage.getItem("guestName");
            
            let errorDiv = document.getElementById("guestErrorMsg");
            let successDiv = document.getElementById("guestSuccessMsg");
            errorDiv.style.display = "none";
            successDiv.style.display = "none";

            if (!fullName) {
                errorDiv.innerText = "Please enter your name";
                errorDiv.style.display = "block";
                return;
            }
            if (!streetAddress) {
                errorDiv.innerText = "Please enter your street address";
                errorDiv.style.display = "block";
                return;
            }
            if (!suburb) {
                errorDiv.innerText = "Please enter your suburb";
                errorDiv.style.display = "block";
                return;
            }
            if (!postcode) {
                errorDiv.innerText = "Please enter your postcode";
                errorDiv.style.display = "block";
                return;
            }

            try {
                const rQuery = query(collection(db, RESPONSES_COLLECTION), where("guestCode", "==", guestCode));
                const rSnapshot = await getDocs(rQuery);

                let responseData = {
                    guestCode: guestCode,
                    guestId: guestId,
                    guestName: guestName,
                    fullName: fullName,
                    unitNumber: unitNumber,
                    streetAddress: streetAddress,
                    suburb: suburb,
                    city: city,
                    state: state,
                    postcode: postcode,
                    fullAddress: fullAddress,
                    guestCount: guestCount,
                    guestNames: guestNames,
                    contact: contact,
                    submittedAt: new Date().toISOString()
                };

                if (!rSnapshot.empty) {
                    await updateDoc(doc(db, RESPONSES_COLLECTION, rSnapshot.docs[0].id), responseData);
                } else {
                    await addDoc(collection(db, RESPONSES_COLLECTION), responseData);
                    await updateDoc(doc(db, GUESTS_COLLECTION, guestId), { replied: true, status: "replied" });
                }

                successDiv.innerText = "Thank you! We have received your details. Your formal invitation will be mailed to you soon. We look forward to celebrating with you!";
                successDiv.style.display = "block";

            } catch (err) {
                errorDiv.innerText = "Something went wrong. Please try again.";
                errorDiv.style.display = "block";
                console.error(err);
            }
        }

        // Admin Dashboard
        function renderAdminLogin() {
            document.getElementById("app").innerHTML = `
                <div class="login-box">
                    <h2>Admin Login</h2>
                    <p>Enter password to access the guest manager</p>
                    <input type="password" id="adminPassword" placeholder="Enter admin password">
                    <button id="loginBtn">Login</button>
                </div>
                <a href="?admin=false" class="admin-link">Back to Guest Page</a>
            `;
            document.getElementById("loginBtn").onclick = function() {
                let pwd = document.getElementById("adminPassword").value;
                if (pwd === ADMIN_PASSWORD) {
                    sessionStorage.setItem("adminLoggedIn", "true");
                    renderAdminDashboard();
                } else {
                    alert("Wrong password");
                }
            };
        }

        async function loadAdminData() {
            try {
                const guestsSnap = await getDocs(collection(db, GUESTS_COLLECTION));
                allGuests = guestsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                const responsesSnap = await getDocs(collection(db, RESPONSES_COLLECTION));
                allResponses = responsesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                for (let i = 0; i < allGuests.length; i++) {
                    let guest = allGuests[i];
                    let found = null;
                    for (let j = 0; j < allResponses.length; j++) {
                        if (allResponses[j].guestCode === guest.code) {
                            found = allResponses[j];
                            break;
                        }
                    }
                    if (found) {
                        guest.responseStatus = "replied";
                    } else {
                        guest.responseStatus = guest.smsSent ? "sent" : "pending";
                    }
                }
                renderGuestTable();
                renderRepliesTable();
                updateStats();
            } catch (err) {
                console.error("Load error:", err);
            }
        }

        function renderGuestTable() {
            let search = document.getElementById("searchGuest")?.value.toLowerCase() || "";
            let filterStatus = document.getElementById("filterStatus")?.value || "all";
            
            let filtered = [];
            for (let i = 0; i < allGuests.length; i++) {
                let g = allGuests[i];
                let nameMatch = g.name.toLowerCase().indexOf(search) > -1 || g.code.toLowerCase().indexOf(search) > -1;
                let statusMatch = filterStatus === "all" || g.responseStatus === filterStatus;
                if (nameMatch && statusMatch) filtered.push(g);
            }
            
            let tbody = document.getElementById("guestTableBody");
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No guests found</td></tr>';
                return;
            }
            
            let html = "";
            for (let i = 0; i < filtered.length; i++) {
                let guest = filtered[i];
                let statusClass = guest.responseStatus === "replied" ? "status-replied" : (guest.responseStatus === "sent" ? "status-sent" : "status-pending");
                let statusText = guest.responseStatus === "replied" ? "Address Received" : (guest.responseStatus === "sent" ? "SMS Sent" : "Pending");
                let phoneDisplay = guest.phone ? escapeHtml(guest.phone) : '<span style="color:#999;">Not set</span>';
                
                html += `<tr>
                    <td><code>${escapeHtml(guest.code)}</code></td>
                    <td><strong>${escapeHtml(guest.name)}</strong></td>
                    <td>${phoneDisplay}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <button class="btn-sm btn-blue" onclick="openEdit('${guest.id}', '${escapeForJS(guest.name)}', '${escapeForJS(guest.phone || "")}')">Edit</button>
                        <button class="btn-sm btn-green" onclick="openSms('${guest.code}', '${escapeForJS(guest.name)}', '${escapeForJS(guest.phone || "")}')">SMS</button>
                    </td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        function renderRepliesTable() {
            let search = document.getElementById("searchReply")?.value.toLowerCase() || "";
            let filtered = [];
            for (let i = 0; i < allResponses.length; i++) {
                let r = allResponses[i];
                let nameMatch = (r.fullName && r.fullName.toLowerCase().indexOf(search) > -1) || (r.guestName && r.guestName.toLowerCase().indexOf(search) > -1);
                if (nameMatch) filtered.push(r);
            }
            
            let tbody = document.getElementById("repliesTableBody");
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No responses yet</td></tr>';
                return;
            }
            
            let html = "";
            for (let i = 0; i < filtered.length; i++) {
                let r = filtered[i];
                let addressShort = r.fullAddress ? r.fullAddress.substring(0, 60) + (r.fullAddress.length > 60 ? "..." : "") : "";
                html += `<tr>
                    <td><code>${escapeHtml(r.guestCode)}</code></td>
                    <td>${escapeHtml(r.guestName)}</td>
                    <td><strong>${escapeHtml(r.fullName || "")}</strong></td>
                    <td style="max-width:250px;">${escapeHtml(addressShort)}</td>
                    <td>${r.submittedAt ? new Date(r.submittedAt).toLocaleDateString() : ""}</td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        function updateStats() {
            let total = allGuests.length;
            let sent = 0;
            for (let i = 0; i < allGuests.length; i++) {
                if (allGuests[i].smsSent) sent++;
            }
            let replied = allResponses.length;
            let pending = total - replied;
            
            let statsHtml = `
                <div class="stat-card"><div class="stat-number">${total}</div><div>Total Invited</div></div>
                <div class="stat-card"><div class="stat-number">${sent}</div><div>SMS Sent</div></div>
                <div class="stat-card"><div class="stat-number">${replied}</div><div>Addresses Received</div></div>
                <div class="stat-card"><div class="stat-number">${pending}</div><div>Awaiting Reply</div></div>
            `;
            let statsContainer = document.getElementById("statsContainer");
            if (statsContainer) statsContainer.innerHTML = statsHtml;
        }

        window.openEdit = function(id, name, phone) {
            currentEditGuestId = id;
            document.getElementById("editGuestName").value = name;
            document.getElementById("editGuestPhone").value = phone;
            document.getElementById("editModal").style.display = "flex";
        };

        window.openSms = function(code, name, phone) {
            if (!phone) {
                alert("Please add a mobile number for " + name + " first. Click Edit to add.");
                return;
            }
            let appUrl = window.location.origin;
            let msg = "Dear " + name.split(' ')[0] + ",\n\nWe are hoping to celebrate our wedding with you on Saturday, 3rd October 2026 at St Monica's Catholic Church, Moonee Ponds.\n\nBefore we send the formal invitation by mail, could you please confirm your postal address and the correct spelling of your name?\n\nPlease visit: " + appUrl + "\nEnter your code: " + code + "\n\nThis will take just 2 minutes. We would be truly honoured to have you there.\n\nWarmly,\nDaniel & Laura";
            
            document.getElementById("smsGuestName").innerText = name;
            document.getElementById("smsPhone").innerText = phone;
            document.getElementById("smsMessage").value = msg;
            document.getElementById("smsModal").style.display = "flex";
            
            for (let i = 0; i < allGuests.length; i++) {
                if (allGuests[i].code === code && !allGuests[i].smsSent) {
                    updateDoc(doc(db, GUESTS_COLLECTION, allGuests[i].id), { smsSent: true, status: "sent" });
                    setTimeout(function() { loadAdminData(); }, 500);
                    break;
                }
            }
        };

        function renderAdminDashboard() {
            document.getElementById("app").innerHTML = `
                <div class="admin-container">
                    <div class="admin-header">
                        <h1>Admin Dashboard</h1>
                        <p>Manage Guests and Track Responses</p>
                    </div>
                    <div class="stats" id="statsContainer"></div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="guests">Guest List</button>
                        <button class="tab-btn" data-tab="replies">Guest Responses</button>
                    </div>
                    <div id="guests" class="tab-content active">
                        <div class="filter-bar">
                            <input type="text" id="searchGuest" placeholder="Search guests...">
                            <select id="filterStatus">
                                <option value="all">All Guests</option>
                                <option value="pending">Pending</option>
                                <option value="sent">SMS Sent</option>
                                <option value="replied">Address Received</option>
                            </select>
                            <button id="refreshBtn" class="btn-sm btn-blue">Refresh</button>
                        </div>
                        <div class="add-guest-form">
                            <input type="text" id="newGuestName" placeholder="New guest name">
                            <input type="tel" id="newGuestPhone" placeholder="Mobile number">
                            <button id="addGuestBtn" class="btn-sm btn-green">Add Guest</button>
                        </div>
                        <div class="guest-table-container">
                            <table>
                                <thead><tr><th>Code</th><th>Guest Name</th><th>Mobile</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody id="guestTableBody"><td><td colspan="5">Loading...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                    <div id="replies" class="tab-content">
                        <div class="filter-bar">
                            <input type="text" id="searchReply" placeholder="Search by name...">
                        </div>
                        <div class="guest-table-container">
                            <table>
                                <thead><tr><th>Code</th><th>Guest Name</th><th>Verified Name</th><th>Postal Address</th><th>Submitted</th></tr></thead>
                                <tbody id="repliesTableBody"><tr><td colspan="5">No responses yet...</td></tr></tbody>
                            </table>
                            <button id="exportCsvBtn" class="btn-sm btn-green" style="margin-top: 15px;">Export Addresses (CSV)</button>
                        </div>
                    </div>
                </div>
                <div id="editModal" class="modal">
                    <div class="edit-modal-content">
                        <h3>Edit Guest</h3>
                        <label>Guest Name:</label>
                        <input type="text" id="editGuestName">
                        <label>Mobile Number:</label>
                        <input type="tel" id="editGuestPhone">
                        <div class="action-buttons">
                            <button id="saveEditBtn" class="btn-sm btn-green">Save</button>
                            <button id="closeEditModal" class="btn-sm btn-red">Cancel</button>
                        </div>
                        <hr>
                        <button id="deleteGuestBtn" class="btn-sm btn-red" style="width:100%;">Delete Guest</button>
                    </div>
                </div>
                <div id="smsModal" class="modal">
                    <div class="modal-content">
                        <h3>Send SMS to Guest</h3>
                        <p><strong id="smsGuestName"></strong></p>
                        <p>Mobile: <span id="smsPhone"></span></p>
                        <textarea id="smsMessage" readonly></textarea>
                        <div class="sms-buttons">
                            <button id="copySmsBtn" class="btn-sm btn-blue">Copy Message</button>
                            <button id="sendDirectSmsBtn" class="btn-sm btn-sms-direct">Open SMS App</button>
                            <button id="closeSmsModal" class="btn-sm btn-red">Close</button>
                        </div>
                    </div>
                </div>
                <a href="?admin=false" class="admin-link">Exit Admin</a>
            `;

            document.getElementById("addGuestBtn").onclick = async function() {
                let name = document.getElementById("newGuestName").value.trim();
                let phone = document.getElementById("newGuestPhone").value.trim();
                if (!name) { alert("Enter name"); return; }
                let code = generateCode(name);
                await addDoc(collection(db, GUESTS_COLLECTION), {
                    name: name, code: code, phone: phone, status: "pending", smsSent: false, replied: false, createdAt: new Date().toISOString()
                });
                document.getElementById("newGuestName").value = "";
                document.getElementById("newGuestPhone").value = "";
                loadAdminData();
            };
            document.getElementById("refreshBtn").onclick = function() { loadAdminData(); };
            document.getElementById("exportCsvBtn").onclick = function() {
                let withAddress = [];
                for (let i = 0; i < allResponses.length; i++) {
                    if (allResponses[i].fullAddress) withAddress.push(allResponses[i]);
                }
                if (withAddress.length === 0) { alert("No addresses yet"); return; }
                let csv = [["Code", "Guest Name", "Verified Name", "Postal Address", "Guests", "Submitted"]];
                for (let i = 0; i < withAddress.length; i++) {
                    let r = withAddress[i];
                    let guestNamesStr = r.guestNames ? r.guestNames.join("; ") : "";
                    csv.push([r.guestCode, r.guestName, r.fullName, r.fullAddress, guestNamesStr, new Date(r.submittedAt).toLocaleDateString()]);
                }
                let content = "";
                for (let i = 0; i < csv.length; i++) {
                    let row = [];
                    for (let j = 0; j < csv[i].length; j++) {
                        row.push('"' + String(csv[i][j]).replace(/"/g, '""') + '"');
                    }
                    content += row.join(",") + "\n";
                }
                let blob = new Blob(["\uFEFF" + content], { type: "text/csv" });
                let url = URL.createObjectURL(blob);
                let a = document.createElement("a");
                a.href = url;
                a.download = "wedding_addresses_" + new Date().toISOString().slice(0,10) + ".csv";
                a.click();
                URL.revokeObjectURL(url);
            };
            document.getElementById("closeEditModal").onclick = function() { document.getElementById("editModal").style.display = "none"; };
            document.getElementById("closeSmsModal").onclick = function() { document.getElementById("smsModal").style.display = "none"; };
            document.getElementById("saveEditBtn").onclick = async function() {
                let newName = document.getElementById("editGuestName").value.trim();
                let newPhone = document.getElementById("editGuestPhone").value.trim();
                await updateDoc(doc(db, GUESTS_COLLECTION, currentEditGuestId), { name: newName, phone: newPhone });
                document.getElementById("editModal").style.display = "none";
                loadAdminData();
            };
            document.getElementById("deleteGuestBtn").onclick = async function() {
                if (!confirm("Delete this guest?")) return;
                let guest = null;
                for (let i = 0; i < allGuests.length; i++) {
                    if (allGuests[i].id === currentEditGuestId) { guest = allGuests[i]; break; }
                }
                if (guest) {
                    for (let i = 0; i < allResponses.length; i++) {
                        if (allResponses[i].guestCode === guest.code) {
                            await deleteDoc(doc(db, RESPONSES_COLLECTION, allResponses[i].id));
                            break;
                        }
                    }
                }
                await deleteDoc(doc(db, GUESTS_COLLECTION, currentEditGuestId));
                document.getElementById("editModal").style.display = "none";
                loadAdminData();
            };
            document.getElementById("copySmsBtn").onclick = function() {
                let msg = document.getElementById("smsMessage").value;
                navigator.clipboard.writeText(msg);
                alert("Copied!");
            };
            document.getElementById("sendDirectSmsBtn").onclick = function() {
                let phone = document.getElementById("smsPhone").innerText;
                let msg = document.getElementById("smsMessage").value;
                window.location.href = "sms:" + phone + "?body=" + encodeURIComponent(msg);
            };
            document.getElementById("searchGuest").oninput = function() { renderGuestTable(); };
            document.getElementById("filterStatus").onchange = function() { renderGuestTable(); };
            document.getElementById("searchReply").oninput = function() { renderRepliesTable(); };

            let btns = document.querySelectorAll(".tab-btn");
            for (let i = 0; i < btns.length; i++) {
                btns[i].onclick = function() {
                    for (let j = 0; j < btns.length; j++) btns[j].classList.remove("active");
                    this.classList.add("active");
                    let contents = document.querySelectorAll(".tab-content");
                    for (let j = 0; j < contents.length; j++) contents[j].classList.remove("active");
                    document.getElementById(this.getAttribute("data-tab")).classList.add("active");
                };
            }
            loadAdminData();
        }

        window.onclick = function(e) {
            if (e.target.classList && e.target.classList.contains("modal")) {
                e.target.style.display = "none";
            }
        };

        (async function() {
            await seedGuests();
            let urlParams = new URLSearchParams(window.location.search);
            let isAdminView = urlParams.get('admin') === 'true';
            
            if (isAdminView) {
                if (sessionStorage.getItem("adminLoggedIn") === "true") {
                    renderAdminDashboard();
                } else {
                    renderAdminLogin();
                }
            } else {
                renderGuestForm();
            }
        })();
    </script>
</body>
</html>
