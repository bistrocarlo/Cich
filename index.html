<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Invitation Code Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #16213e, #0f3460); color: white; padding: 30px; border-radius: 20px; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #0f3460; }
        .section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .section h2 { margin-bottom: 20px; color: #0f3460; }
        .code-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .code-card { background: #f8f9fa; border-radius: 12px; padding: 15px; border-left: 4px solid #27ae60; }
        .code { font-family: monospace; font-size: 1.3rem; font-weight: bold; color: #0f3460; }
        .btn { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn-blue { background: #3498db; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 5px; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .status-attending { background: #27ae60; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .status-declined { background: #e74c3c; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .status-pending { background: #f39c12; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container" style="display: none;">
        <h2>🔐 Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter admin password" style="width:100%; margin:15px 0;">
        <button id="loginBtn" class="btn" style="width:100%;">Login</button>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="container">
            <header>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>📋 Invitation Code Manager</h1>
                    <button id="logoutBtn" class="btn btn-red">Logout</button>
                </div>
                <p>Laura & Daniel's Wedding - October 3, 2026</p>
            </header>

            <div class="stats" id="statsContainer"></div>

            <div class="section">
                <h2>➕ Generate Invitation Codes</h2>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <input type="text" id="guestNameInput" placeholder="Guest/Party Name" style="flex:2;">
                    <input type="text" id="manualCode" placeholder="Custom code (e.g., LD001)" style="flex:1;">
                    <select id="partyTypeSelect">
                        <option value="single">👤 Single</option>
                        <option value="couple">💑 Couple</option>
                        <option value="family">👨‍👩‍👧‍👦 Family</option>
                        <option value="extended">👥 Extended Family</option>
                    </select>
                    <button id="generateBtn" class="btn btn-green">Generate Code</button>
                </div>
                <div id="generatedMsg" style="margin-top: 15px; display: none; background: #d4edda; padding: 15px; border-radius: 10px;"></div>
            </div>

            <div class="section">
                <h2>🎟️ All Invitation Codes</h2>
                <div class="filter-bar">
                    <input type="text" id="searchCodes" placeholder="Search by name or code...">
                    <select id="rsvpFilterCodes">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="attending">Attending</option>
                        <option value="declined">Declined</option>
                    </select>
                    <button id="exportCodesBtn" class="btn btn-blue">📄 Export All Codes</button>
                    <button id="refreshBtn" class="btn">🔄 Refresh</button>
                </div>
                <div id="codesGrid" class="code-grid"></div>
            </div>

            <div class="section">
                <h2>📊 Guest Responses</h2>
                <div class="filter-bar">
                    <input type="text" id="searchResponses" placeholder="Search by name...">
                    <button id="exportResponsesBtn" class="btn btn-green">📄 Export Addresses (CSV)</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="responsesTable">
                        <thead>
                            <tr><th>Code</th><th>Guest Name</th><th>Full Name (Verified)</th><th>Address</th><th>Party Type</th><th>Total People</th><th>Status</th><th>Submitted</th></tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="8" style="text-align:center;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAH0rBpJUh3sRpBlQgrymQM1RLBDBiAPmE",
            authDomain: "daniel-and-laura.firebaseapp.com",
            projectId: "daniel-and-laura",
            storageBucket: "daniel-and-laura.firebasestorage.app",
            messagingSenderId: "363458517473",
            appId: "1:363458517473:web:7eac683bc98623cb281aa0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "LauraDaniel2026";

        let allCodes = [];
        let allResponses = [];

        function checkAuth() { return sessionStorage.getItem("adminAuth") === "true"; }

        document.getElementById("loginBtn")?.addEventListener("click", () => {
            if (document.getElementById("adminPassword").value === ADMIN_PASSWORD) {
                sessionStorage.setItem("adminAuth", "true");
                showAdminPanel();
            } else { alert("Wrong password"); }
        });

        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            sessionStorage.removeItem("adminAuth");
            showLoginPage();
        });

        function showLoginPage() {
            document.getElementById("loginPage").style.display = "block";
            document.getElementById("adminPanel").style.display = "none";
        }

        function showAdminPanel() {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            loadData();
        }

        async function loadData() {
            const codesSnap = await getDocs(collection(db, "invite_codes"));
            allCodes = codesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const responsesSnap = await getDocs(collection(db, "rsvp_responses"));
            allResponses = responsesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            renderCodes();
            renderResponses();
            updateStats();
        }

        function renderCodes() {
            const search = document.getElementById("searchCodes")?.value.toLowerCase() || "";
            const filter = document.getElementById("rsvpFilterCodes")?.value || "all";
            
            let filtered = allCodes.filter(c => 
                c.name?.toLowerCase().includes(search) || c.code?.toLowerCase().includes(search)
            );
            
            const container = document.getElementById("codesGrid");
            if (filtered.length === 0) {
                container.innerHTML = "<p>No codes generated yet.</p>";
                return;
            }
            
            container.innerHTML = filtered.map(code => {
                const response = allResponses.find(r => r.inviteCode === code.code);
                const status = response?.status || "pending";
                return `
                    <div class="code-card">
                        <div class="code">🎟️ ${code.code}</div>
                        <div><strong>${escapeHtml(code.name)}</strong></div>
                        <div>👥 ${code.partyType || "single"}</div>
                        <div><span class="status-${status}">${getStatusText(status)}</span></div>
                        <div style="margin-top: 10px;">
                            <button class="btn" onclick="copyCode('${code.code}')">📋 Copy Code</button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderResponses() {
            const search = document.getElementById("searchResponses")?.value.toLowerCase() || "";
            let filtered = allResponses.filter(r => 
                r.fullName?.toLowerCase().includes(search) || r.guestOriginalName?.toLowerCase().includes(search)
            );
            
            const tbody = document.getElementById("tableBody");
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No responses yet. Guests need to enter their codes.</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(r => `
                <tr>
                    <td><strong>${escapeHtml(r.inviteCode)}</strong></td>
                    <td>${escapeHtml(r.guestOriginalName)}</td>
                    <td>${escapeHtml(r.fullName)}</td>
                    <td style="max-width: 250px;">${escapeHtml(r.address?.substring(0, 60))}${r.address?.length > 60 ? '...' : ''}</td>
                    <td>${r.partyType}</td>
                    <td>${r.totalPeople || 1}</td>
                    <td><span class="status-${r.status}">${r.status === 'attending' ? '✅ Attending' : '❌ Declined'}</span></td>
                    <td>${new Date(r.submittedAt).toLocaleDateString()}</td>
                </tr>
            `).join("");
        }

        function updateStats() {
            const total = allCodes.length;
            const responded = allResponses.length;
            const attending = allResponses.filter(r => r.status === "attending").length;
            const totalPeople = allResponses.reduce((sum, r) => sum + (r.totalPeople || 0), 0);
            const pending = total - responded;
            
            document.getElementById("statsContainer").innerHTML = `
                <div class="stat-card"><div class="stat-number">${total}</div><div>Invitations Sent</div></div>
                <div class="stat-card"><div class="stat-number">${responded}</div><div>Responses Received</div></div>
                <div class="stat-card"><div class="stat-number">${attending}</div><div>Attending</div></div>
                <div class="stat-card"><div class="stat-number">${totalPeople}</div><div>Total Guests</div></div>
                <div class="stat-card"><div class="stat-number">${pending}</div><div>Awaiting Response</div></div>
            `;
        }

        document.getElementById("generateBtn")?.addEventListener("click", async () => {
            const name = document.getElementById("guestNameInput").value.trim();
            let code = document.getElementById("manualCode").value.trim().toUpperCase();
            const partyType = document.getElementById("partyTypeSelect").value;
            
            if (!name) { alert("Enter guest name"); return; }
            if (!code) { code = name.substring(0, 3).toUpperCase() + Math.floor(Math.random() * 1000); }
            
            await addDoc(collection(db, "invite_codes"), {
                code: code,
                name: name,
                displayName: name,
                partyType: partyType,
                createdAt: new Date().toISOString()
            });
            
            document.getElementById("generatedMsg").style.display = "block";
            document.getElementById("generatedMsg").innerHTML = `✅ Code <strong>${code}</strong> generated for ${name}<br>📋 Share this code with the guest.`;
            document.getElementById("guestNameInput").value = "";
            document.getElementById("manualCode").value = "";
            loadData();
        });

        document.getElementById("exportResponsesBtn")?.addEventListener("click", () => {
            const withAddress = allResponses.filter(r => r.address);
            if (withAddress.length === 0) { alert("No addresses yet"); return; }
            let csv = [["Invite Code", "Original Guest", "Verified Name", "Address", "Party Type", "Family/Partner", "Total People", "Status"]];
            withAddress.forEach(r => {
                let familyInfo = "";
                if (r.partnerName) familyInfo = r.partnerName;
                if (r.familyMembers) familyInfo = r.familyMembers.join("; ");
                if (r.extendedNames) familyInfo = r.extendedNames;
                csv.push([r.inviteCode, r.guestOriginalName, r.fullName, r.address, r.partyType, familyInfo, r.totalPeople, r.status]);
            });
            const blob = new Blob(["\uFEFF" + csv.map(row => row.map(c => `"${c}"`).join(",")).join("\n")], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `wedding_rsvp_addresses_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        });

        window.copyCode = (code) => { navigator.clipboard.writeText(code); alert(`Code ${code} copied!`); };
        
        function getStatusText(status) {
            if (status === "attending") return "✅ Attending";
            if (status === "declined") return "❌ Declined";
            return "⏳ Pending";
        }
        
        function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[m])); }
        
        document.getElementById("searchCodes")?.addEventListener("input", () => renderCodes());
        document.getElementById("rsvpFilterCodes")?.addEventListener("change", () => renderCodes());
        document.getElementById("searchResponses")?.addEventListener("input", () => renderResponses());
        document.getElementById("refreshBtn")?.addEventListener("click", () => loadData());
        
        if (checkAuth()) showAdminPanel(); else showLoginPage();
    </script>
</body>
</html>
